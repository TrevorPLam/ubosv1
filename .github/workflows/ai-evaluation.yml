name: AI Evaluation Framework

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'artifacts/api-server/src/lib/eval/**'
      - 'data/eval/**'
      - 'artifacts/api-server/src/lib/chat-service.ts'
      - 'artifacts/api-server/src/lib/chat-stream.ts'
      - '.github/workflows/ai-evaluation.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'artifacts/api-server/src/lib/eval/**'
      - 'data/eval/**'
      - 'artifacts/api-server/src/lib/chat-service.ts'
      - 'artifacts/api-server/src/lib/chat-stream.ts'
      - '.github/workflows/ai-evaluation.yml'

jobs:
  evaluation:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for baseline comparison
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build API server
      run: pnpm --filter @workspace/api-server run build
    
    - name: Setup environment
      run: |
        cp artifacts/api-server/.env.example artifacts/api-server/.env
        echo "NODE_ENV=test" >> artifacts/api-server/.env
        echo "LOG_LEVEL=info" >> artifacts/api-server/.env
    
    - name: Run AI Evaluation
      run: |
        cd artifacts/api-server
        pnpm run eval data/eval --verbose
    
    - name: Upload evaluation report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: evaluation-report-${{ matrix.node-version }}
        path: artifacts/api-server/evaluation-report.md
        retention-days: 30
    
    - name: Check evaluation results
      run: |
        # Check if evaluation passed (exit code 0)
        # Exit codes: 0=success, 1=failures, 2=config error, 3=dataset error, 4=regression
        cd artifacts/api-server
        eval_exit_code=0
        pnpm run eval data/eval --no-report || eval_exit_code=$?
        
        echo "Evaluation exit code: $eval_exit_code"
        
        if [ $eval_exit_code -eq 4 ]; then
          echo "❌ Regressions detected - blocking merge"
          exit 1
        elif [ $eval_exit_code -eq 2 ] || [ $eval_exit_code -eq 3 ]; then
          echo "❌ Configuration or dataset error"
          exit 1
        elif [ $eval_exit_code -eq 1 ]; then
          echo "⚠️ Evaluation completed with failures (non-blocking)"
          exit 0
        else
          echo "✅ Evaluation passed successfully"
          exit 0
        fi
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = 'artifacts/api-server/evaluation-report.md';
          
          if (fs.existsSync(path)) {
            const report = fs.readFileSync(path, 'utf8');
            
            // Extract summary from report
            const summaryMatch = report.match(/## Summary\n- Total Examples: (\d+)\n- Passed: (\d+) \(([\d.]+)%\)\n- Failed: (\d+)\n- Overall Score: ([\d.]+)%/);
            
            if (summaryMatch) {
              const [, total, passed, passedPercent, failed, overallScore] = summaryMatch;
              
              const comment = `
## 🤖 AI Evaluation Results

| Metric | Result |
|--------|--------|
| Total Examples | ${total} |
| Passed | ${passed} (${passedPercent}%) |
| Failed | ${failed} |
| Overall Score | ${overallScore}% |

${failed > 0 ? '⚠️ **Some evaluations failed** - review the full report for details.' : '✅ **All evaluations passed**'}

[View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          }
