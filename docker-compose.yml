version: '3.8'

services:
  # Feature Flag Management - Unleash
  unleash-postgres:
    image: postgres:15-alpine
    container_name: unleash-postgres
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash_password
    volumes:
      - unleash_postgres_data:/var/lib/postgresql/data
    networks:
      - unleash-network
    restart: unless-stopped

  unleash-server:
    image: unleashorg/unleash-server:latest
    container_name: unleash-server
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgresql://unleash:unleash_password@unleash-postgres:5432/unleash
      DATABASE_SSL: 'false'
      DATABASE_HOST: unleash-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: unleash
      DATABASE_USERNAME: unleash
      DATABASE_PASSWORD: unleash_password
      UNLEASH_URL: http://localhost:4242
      UNLEASH_SECRET: default-secret-key-change-in-production
      LOG_LEVEL: info
      ADMIN_API_TOKENS: admin:token
      READ_ONLY_API_TOKENS: readonly:token
      CLIENT_API_TOKENS: client:token
    depends_on:
      - unleash-postgres
    networks:
      - unleash-network
    restart: unless-stopped
    volumes:
      - unleash_server_data:/tmp/unleash

  # Optional: Unleash Edge for frontend SDK support
  unleash-edge:
    image: unleashorg/unleash-edge:latest
    container_name: unleash-edge
    ports:
      - "3000:3000"
    environment:
      UNLEASH_PROXY_URLS: http://unleash-server:4242
      UNLEASH_PROXY_SECRET: edge-secret-change-in-production
    depends_on:
      - unleash-server
    networks:
      - unleash-network
    restart: unless-stopped

volumes:
  unleash_postgres_data:
  unleash_server_data:

networks:
  unleash-network:
    driver: bridge
