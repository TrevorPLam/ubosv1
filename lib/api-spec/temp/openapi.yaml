components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        model:
          type: string
        status:
          type: string
          enum: [idle, thinking, running-tool, awaiting-approval, error]
        memoryUsageMb:
          type: integer
        tokenCount:
          type: integer
        lastHeartbeatAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id, name, model, status, createdAt, updatedAt
    AgentRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        tokenUsageInput:
          type: integer
        tokenUsageOutput:
          type: integer
        costEstimate:
          type: string
          format: decimal
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id, agentId, status, createdAt
    ToolCall:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agentRunId:
          type: string
          format: uuid
        toolName:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, timeout]
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
        executionTimeMs:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id, agentRunId, toolName, status, createdAt
    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agentRunId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        priority:
          type: string
          enum: [low, medium, high, critical]
        requiredBy:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
      required:
        - id, agentRunId, title, description, status, priority, createdAt
    ApprovalDecision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        approvalRequestId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approved, rejected]
        decidedBy:
          type: string
        decidedByName:
          type: string
        comment:
          type: string
        decidedAt:
          type: string
          format: date-time
      required:
        - id, approvalRequestId, decision, decidedBy, decidedAt
    AgentListResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - agents, pagination
    AgentDetailResponse:
      type: object
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/AgentRun"
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
      required:
        - agent
    ApprovalListResponse:
      type: object
      properties:
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - approvals, pagination
    ApprovalDecisionRequest:
      type: object
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        comment:
          type: string
      required:
        - decision
    ApprovalDecisionResponse:
      type: object
      properties:
        decision:
          $ref: "#/components/schemas/ApprovalDecision"
        approvalRequest:
          $ref: "#/components/schemas/ApprovalRequest"
      required:
        - decision, approvalRequest
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required:
        - page, limit, total, totalPages
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
      required:
        - error, statusCode
    ValidationError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
        details:
          type: object
      required:
        - error, statusCode
    # Chat schemas
    ChatThread:
      type: object
      properties:
        id:
          type: string
