            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
/templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List project templates
      description: Returns list of project templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
